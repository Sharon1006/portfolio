        .gallery-item img {

        code {

            border-radius: 3px;
            font-size: 14px;
            word-break: break-all;
        }
        
        /* ========== 加载动画样式 ========== */

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #e8f5e9;  /* 浅绿色背景 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        
        /* 进度条容器 */
        .progress-bar-container {
            width: 300px;
            height: 8px;
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
        }
        
        /* 进度条 */

            width: 0%;
            height: 100%;
            background: #2e7d32;  /* 深绿色 */

            transition: width 0.3s ease;
        }

            margin-bottom: 10px;

        }
        
        /* 隐藏页面内容（初始状态） */

    <script>
        // 获取所有需要加载的图片
        const allImages = document.querySelectorAll('.gallery img');
        const totalImages = allImages.length;
        let loadedCount = 0;
        
        const loaderOverlay = document.getElementById('loaderOverlay');
        const progressBar = document.getElementById('progressBar');
        const mainContent = document.getElementById('mainContent');
        const loaderText = document.querySelector('.loader-text');
        
        // 更新进度条
        function updateProgress() {
            const percent = (loadedCount / totalImages) * 100;
            progressBar.style.width = percent + '%';
            loaderText.textContent = `加载中... ${Math.floor(percent)}%`;
        }
        
        // 检查是否全部加载完成
        function checkAllLoaded() {
            if (loadedCount === totalImages) {
                // 进度条走满
                progressBar.style.width = '100%';
                loaderText.textContent = '加载完成！';
                
                // 延迟一点点让用户看到100%，然后淡出加载层
                setTimeout(() => {
                    loaderOverlay.style.opacity = '0';
                    setTimeout(() => {
                        loaderOverlay.style.display = 'none';
                        mainContent.classList.add('visible');
                    }, 500);
                }, 300);
            }
        }
        
        // 如果没有任何图片，直接显示
        if (totalImages === 0) {
            loaderOverlay.style.display = 'none';
            mainContent.classList.add('visible');
        } else {
            // 先隐藏内容（防止闪现）
            mainContent.classList.remove('visible');
            
            // 为每张图片添加加载监听
            allImages.forEach((img) => {
                // 如果图片已经加载完成（缓存）
                if (img.complete) {
                    loadedCount++;
                    updateProgress();
                    checkAllLoaded();
                } else {
                    // 等待图片加载
                    img.addEventListener('load', () => {
                        loadedCount++;
                        updateProgress();
                        checkAllLoaded();
                    });
                    // 图片加载失败也计入（防止卡死）
                    img.addEventListener('error', () => {
                        loadedCount++;
                        updateProgress();
                        checkAllLoaded();
                    });
                }
            });
        }
        
        // 初始化 Fancybox
        Fancybox.bind('[data-fancybox="gallery"]', {
            Toolbar: {
                display: {
                    left: ["infobar"],
                    middle: [
                        "zoomIn",
                        "zoomOut",
                        "toggle1to1",
                        "rotateCCW",
                        "rotateCW",
                        "flipX",
                        "flipY",
                    ],
                    right: ["slideshow", "thumbs", "download", "close"],
                },
            },
        });
    </script>
