<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>孙晓冉的作品集</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;  /* 加宽一点，给图片留空间 */
            margin: 50px auto;
            padding: 20px;
            line-height: 1.6;
            color: #333;
        }
        
        /* 头部区域：标题+照片放在同一行 */
        .header {
            display: flex;
            gap: 40px;
            margin-bottom: 40px;
            align-items: center;  /* 垂直居中对齐 */
        }
        
        .header-text {
            flex: 2;
        }
        
        .header-photo {
            flex: 0 0 150px;  /* 固定宽度150px */
            text-align: center;
        }
        
        .header-photo img {
            width: 100%;
            border-radius: 10px;  /* 圆角 */
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);  /* 阴影 */
        }
        
        h1 {
            color: #e74c3c;
            margin-top: 0;
        }
        
        h2 {
            color: #3498db;
            margin-top: 40px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        
        a {
            color: #2980b9;
            text-decoration: none;
        }
        
        a:hover {
            text-decoration: underline;
        }
        
        hr {
            border: 0;
            height: 1px;
            background: linear-gradient(to right, #ccc, transparent);
            margin: 40px 0;
        }
        
        /* 作品图片网格 */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));  /* 自适应列数 */
            gap: 20px;
            margin: 30px 0;
        }
        
        .gallery-item {
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .gallery-item:hover {
            transform: scale(1.02);  /* 鼠标悬停时轻微放大 */
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .gallery-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;  /* 保持比例，裁剪多余部分 */
            display: block;
        }
        
        .gallery-item p {
            margin: 0;
            padding: 10px;
            text-align: center;
            background: #f9f9f9;
            font-size: 14px;
        }
        
        .contact {
            margin-top: 50px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            text-align: center;
        }
        
        code {
            background: #f4f4f4;
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 14px;
            word-break: break-all;  /* 长链接自动换行 */
        }
    </style>
</head>
<body>
